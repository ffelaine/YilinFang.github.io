name: Get Citation Data

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 8 * * *"   # 08:00 UTC daily

jobs:
  scholar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scholarly jsonpickle

      - name: Run Google Scholar crawler
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
        run: |
          python google_scholar_crawler/main.py
          ls -lah results

      - name: Push results to google-scholar-stats branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin || true
          git switch --orphan google-scholar-stats
          git rm -rf . || true

          mkdir -p results
          cp -r results/* results/ || true

          git add results/gs_data.json results/gs_data_shieldsio.json
          git commit -m "Update Google Scholar stats" || echo "No changes to commit"
          git push -f origin google-scholar-stats
